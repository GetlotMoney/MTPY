dataset:
  value: AWA2
num_class:
  value: 50
num_attribute:
  value: 85
img_size:
  value: 448
resnet_region:
  value: 196

dim_f_clip:
  value: 768
dim_v_clip:
  value: 768
device:
  value: cuda:1  # 根据你的显卡空闲情况调整

# === [修改点] ===
# 建议增大到 128 (显存允许的话)，之前的实验证明 128 比 50 更稳
batch_size:
  value: 128
epochs:
  value: 50

# === [关键参数] ===
# AWA2 必须使用 'cosine'，配合 Residual Fusion 中的归一化分支
classifier_metric:
  value: cosine

use_unzip:
  value: True
random_seed:
  value: 17

## === Loss 权重 (沿用实验 B 的最佳配置) ===
#lambda_cal:
#  value: 0.2
#lambda_reg:
#  value: 0.5   # 强正则化，强制 DSME 分支学准属性
#lambda_con:
#  value: 0.4   # 降低对比损失权重，避免破坏类内分布


# === Loss 权重 (公共参数值设置测试) ===
lambda_cal:
  value: 0.05
lambda_reg:
  value: 0.3
lambda_con:
  value: 0.2

normalize_V:
  value: True
tf_SAtt:
  value: True
tf_ec_layer:
  value: 1
tf_dc_layer:
  value: 1
tf_heads:
  value: 4
tf_clip_common_dim:
  value: 300
tf_aux_embed:
  value: True
tf_dim_feedforward:
  value: 512
tf_dropout:
  value: 0.5

is_bias:
  value: False